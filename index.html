body {

  margin: 0;
  background: linear-gradient(135deg, #4f6cff, #7c3aed);

}

.container {

  margin: auto;
  padding: 40px 20px;
}

h1 {

  color: white;
  font-size: 32px;
  margin-bottom: 40px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 25px;
}

.card {

  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.15);
  transition: all 0.25s ease;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 45px rgba(0,0,0,0.2);
}

.stats {

  font-weight: 600;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid #e5e7eb;
  font-size: 14px;
  transition: 0.2s;
}

input:focus, select:focus {
  outline: none;
  border-color: #4f6cff;
  box-shadow: 0 0 0 3px rgba(79,108,255,0.2);
}

button {

  color: white;
  border: none;
  padding: 14px;
  border-radius: 10px;
  cursor: pointer;
  width: 100%;
  font-weight: 600;
  transition: 0.2s;
}

button:hover {

  opacity: 0.95;
}

#search {

  padding: 14px;
  border-radius: 12px;
  border: none;
  margin: 25px 0;
  font-size: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.table-card {

}

table {
  width: 100%;
  border-collapse: collapse;
  overflow: hidden;
  border-radius: 12px;
}

th, td {

  text-align: left;
}

th {
  background: #4f6cff;
  color: white;
}

tr:nth-child(even) {

}

canvas {
  margin-top: 15px;
}

/* 🔥 RESPONSIVE */
@media (max-width: 800px) {
  .grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<script>

const API_URL = "PASTE_YOUR_SCRIPT_URL_HERE";

let fullData = [];
let chart;

// LOAD DATA
async function loadData() {
  const res = await fetch(API_URL);
  const data = await res.json();

  fullData = data.slice(1);

  document.getElementById("count").innerText = fullData.length;

  renderTable(fullData);
  renderChart(fullData);
}

// TABLE
function renderTable(data) {
  const table = document.querySelector("#table tbody");
  table.innerHTML = "";

  data.slice().reverse().slice(0,10).forEach(row => {
    table.innerHTML += `
      <tr>
        <td>${row[0]} ${row[1]}</td>
        <td>${row[2]}</td>
        <td>${row[3]}</td>
        <td>${row[4]}</td>
        <td>${row[5]}</td>
      </tr>`;
  });
}

// CHART
function renderChart(data) {
  const countMap = {};

  data.forEach(row => {
    const issue = row[5];
    countMap[issue] = (countMap[issue] || 0) + 1;
  });

  const labels = Object.keys(countMap);
  const values = Object.values(countMap);

  const ctx = document.getElementById("issueChart").getContext("2d");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'Issue Frequency',
        data: values
      }]
    }
  });
}

// SEARCH
document.getElementById("search").addEventListener("input", (e) => {
  const value = e.target.value.toLowerCase();

  const filtered = fullData.filter(row =>
    row.join(" ").toLowerCase().includes(value)
  );

  renderTable(filtered);
});

// FORM
document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData(e.target);

  const payload = {
    intern: formData.get("intern"),
    location: formData.get("location"),
    machine: formData.get("machine"),
    problem: formData.get("problem"),
    solution: formData.get("solution")
  };

  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  });

  document.getElementById("successMsg").style.display = "block";

  setTimeout(() => {
    document.getElementById("successMsg").style.display = "none";
  }, 2000);

  e.target.reset();
  loadData();
});

loadData();

</script>
