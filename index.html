<!DOCTYPE html>
<html>
<head>
  <title>ECIL-Rapiscan Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #4f6cff, #7c3aed);
  color: #1f2937;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 30px;
}

h1 {
  text-align: center;
  color: white;
  margin-bottom: 30px;
}

/* CARDS */
.grid {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 14px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.stats {
  font-size: 22px;
  font-weight: bold;
}

/* INPUTS */
input, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
}

/* BUTTONS */
button {
  background: linear-gradient(135deg, #4f6cff, #7c3aed);
  color: white;
  border: none;
  padding: 12px;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

/* FILTER BAR */
.filters {
  display: flex;
  gap: 10px;
  margin: 20px 0;
}

.filters select, .filters input {
  flex: 1;
}

/* TABLE */
.table-wrapper {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 900px;
}

th, td {
  padding: 12px;
  text-align: left;
}

th {
  background: #4f6cff;
  color: white;
  cursor: pointer;
}

tr:nth-child(even) {
  background: #f5f5f5;
}

/* CHART */
canvas {
  margin-top: 20px;
}

/* RESPONSIVE */
@media(max-width:800px){
  .grid {
    grid-template-columns: 1fr;
  }
  .filters {
    flex-direction: column;
  }
}
</style>
</head>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxDGGGB5fDoHIfoOAjPV_tBGoirIdgjDJnHRniYvy9rEQwyvDNYErf8gWEzqCmiEFf8CQ/exec";

let fullData = [];
let chart;

// LOAD DATA
async function loadData() {
  const res = await fetch(API_URL);
  const data = await res.json();

  fullData = data.slice(1);

  document.getElementById("count").innerText = fullData.length;

  populateFilters();
  render(fullData);
}

// RENDER ALL
function render(data){
  renderTable(data);
  renderChart(data);
}

// TABLE
function renderTable(data){
  const tbody = document.querySelector("#table tbody");
  tbody.innerHTML = "";

  data.slice().reverse().forEach(row => {
    tbody.innerHTML += `
      <tr>
        <td>${row[0]}</td>
        <td>${row[2]}</td>
        <td>${row[3]}</td>
        <td>${row[4]}</td>
        <td>${row[5]}</td>
        <td>${row[6]}</td>
      </tr>
    `;
  });
}

// FILTERS
function populateFilters(){
  const interns = [...new Set(fullData.map(r => r[2]))];
  const machines = [...new Set(fullData.map(r => r[4]))];

  const iSelect = document.getElementById("filterIntern");
  const mSelect = document.getElementById("filterMachine");

  interns.forEach(i => iSelect.innerHTML += `<option>${i}</option>`);
  machines.forEach(m => mSelect.innerHTML += `<option>${m}</option>`);
}

// SEARCH + FILTER
document.getElementById("search").addEventListener("input", filterData);
document.getElementById("filterIntern").addEventListener("change", filterData);
document.getElementById("filterMachine").addEventListener("change", filterData);

function filterData(){
  const text = document.getElementById("search").value.toLowerCase();
  const intern = document.getElementById("filterIntern").value;
  const machine = document.getElementById("filterMachine").value;

  let filtered = fullData.filter(row => {
    return row.join(" ").toLowerCase().includes(text)
      && (!intern || row[2] === intern)
      && (!machine || row[4] === machine);
  });

  render(filtered);
}

// SORT
function sortTable(col){
  fullData.sort((a,b)=> a[col].localeCompare(b[col]));
  render(fullData);
}

// CHART
function renderChart(data){
  const map = {};
  data.forEach(r=>{
    map[r[5]] = (map[r[5]]||0)+1;
  });

  const ctx = document.getElementById("chart");

  if(chart) chart.destroy();

  chart = new Chart(ctx,{
    type:"bar",
    data:{
      labels:Object.keys(map),
      datasets:[{data:Object.values(map)}]
    }
  });
}

// EXPORT CSV
function exportCSV(){
  let csv = "Date,Intern,Location,Machine,Problem,Solution\n";

  fullData.forEach(r=>{
    csv += `${r[0]},${r[2]},${r[3]},${r[4]},${r[5]},${r[6]}\n`;
  });

  const blob = new Blob([csv]);
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "data.csv";
  a.click();
}

// FORM
document.getElementById("form").addEventListener("submit", async e=>{
  e.preventDefault();

  const fd = new FormData(e.target);

  await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      intern: fd.get("intern"),
      location: fd.get("location"),
      machine: fd.get("machine"),
      problem: fd.get("problem"),
      solution: fd.get("solution")
    })
  });

  e.target.reset();
  loadData();
});

loadData();

</script>
