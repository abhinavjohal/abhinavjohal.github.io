<!DOCTYPE html>
<html>
<head>
  <title>ECIL-Rapiscan Dashboard</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #333;
    }

    h1 {
      color: white;
      margin-bottom: 20px;
    }

    .container {
      padding: 20px;
    }

    .grid {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      width: 350px;
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
      outline: none;
      transition: 0.2s;
    }

    input:focus, select:focus {
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102,126,234,0.5);
    }

    button {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }

    .stats {
      font-size: 20px;
      font-weight: bold;
    }

    .success {
      color: green;
      font-size: 14px;
      margin-top: 10px;
      display: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      text-align: left;
    }

    th {
      background: #667eea;
      color: white;
    }

    tr:nth-child(even) {
      background: #f9f9f9;
    }

  </style>
</head>

<body>

</div>

<!-- TABLE -->
<div class="card" style="width: 100%; margin-top:20px;">
  <h3>Recent Entries</h3>

  <table id="table">
    <thead>
      <tr>
        <th>Date & Time</th>
        <th>Intern</th>
        <th>Location</th>
        <th>Machine</th>
        <th>Problem</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxDGGGB5fDoHIfoOAjPV_tBGoirIdgjDJnHRniYvy9rEQwyvDNYErf8gWEzqCmiEFf8CQ/exec"; // 🔴 replace this

async function loadData() {
  const res = await fetch(API_URL);
  const data = await res.json();

  document.getElementById("count").innerText = data.length - 1;

  const table = document.querySelector("#table tbody");
  table.innerHTML = "";

  data.slice(1).reverse().slice(0,5).forEach(row => {
    const tr = `<tr>
      <td>${row[0]} ${row[1]}</td>
      <td>${row[2]}</td>
      <td>${row[3]}</td>
      <td>${row[4]}</td>
      <td>${row[5]}</td>
    </tr>`;
    table.innerHTML += tr;
  });
}

document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData(e.target);

  const payload = {
    intern: formData.get("intern"),
    location: formData.get("location"),
    machine: formData.get("machine"),
    problem: formData.get("problem"),
    solution: formData.get("solution")
  };

  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  });

  alert("✅ Entry Submitted!");
  e.target.reset();
  loadData();
});

loadData();

</script>

</body>
</html>
