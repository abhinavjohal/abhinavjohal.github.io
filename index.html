.container {

h1 {

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 20px;
}

/* CARDS */
.card {
  background: white;
  padding: 20px;
  border-radius: 14px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* INPUT */
input, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
}

/* BUTTON */
button {
  background: linear-gradient(135deg, #4f6cff, #7c3aed);
  color: white;
  border: none;
  padding: 12px;
  border-radius: 8px;
  cursor: pointer;
}

/* FILTER */
.filters {
  display: flex;
  gap: 10px;
  margin: 20px 0;
}

/* TABLE FIX */
.table-wrapper {
  overflow-x: auto;
}

table {
  width: 100%;
  min-width: 1100px;
  border-collapse: collapse;
}

th, td {
  padding: 12px;
}

th {
  background: #4f6cff;
  color: white;
  position: sticky;
  top: 0;
}

/* IMPORTANT FIX */
.problem, .solution {
  white-space: normal;
  max-width: 250px;
}

/* RESPONSIVE */
@media(max-width:800px){
  .grid { grid-template-columns: 1fr; }
}
</style>

<script>

const API_URL = "https://docs.google.com/spreadsheets/d/1F6a0eFhAHUJ7L6dsRtg7BVIsnm34ObborfGmPJ2GiK0/edit?usp=sharing";

let fullData = [];

// LOAD
async function loadData(){
  const res = await fetch(API_URL);
  const data = await res.json();

  fullData = data.slice(1);
  document.getElementById("count").innerText = fullData.length;

  populateMachines();
  render(fullData);
}

// RENDER TABLE
function render(data){
  const tbody = document.querySelector("tbody");
  tbody.innerHTML = "";

  data.slice().reverse().forEach(r=>{
    tbody.innerHTML += `
    <tr>
      <td>${r[0]} ${r[1]}</td>
      <td>${r[2]}</td>
      <td>${r[3]}</td>
      <td>${r[4]}</td>
      <td class="problem">${r[5]}</td>
      <td class="solution">${r[6]}</td>
    </tr>`;
  });
}

// MACHINE FILTER (LIMIT 10)
function populateMachines(){
  const machines = [...new Set(fullData.map(r=>r[4]))];
  const select = document.getElementById("filterMachine");

  select.innerHTML = `<option value="">All Machines</option>`;

  machines.slice(0,10).forEach(m=>{
    select.innerHTML += `<option>${m}</option>`;
  });

  if(machines.length>10){
    select.innerHTML += `<option value="more">Show More</option>`;
  }
}

// SEARCH
document.getElementById("search").addEventListener("input",()=>{
  const val = search.value.toLowerCase();
  render(fullData.filter(r=>r.join(" ").toLowerCase().includes(val)));
});

// EXPORT
function exportCSV(){
  let csv = fullData.map(r=>r.join(",")).join("\n");
  let blob = new Blob([csv]);
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "data.csv";
  a.click();
}

// FORM
form.onsubmit = async e=>{
  e.preventDefault();
  const fd = new FormData(form);

  await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      intern:fd.get("intern"),
      location:fd.get("location"),
      machine:fd.get("machine"),
      problem:fd.get("problem"),
      solution:fd.get("solution")
    })
  });

  loadData();
};

loadData();

</script>
